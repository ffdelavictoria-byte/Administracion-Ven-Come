{% load static %}
{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">Configuración de Sueldos por Puesto</h2>

    <div class="card shadow">
        <div class="card-body">
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Sucursal</th>
                        <th>Nombre del Puesto</th>
                        <th>Sueldo Base (6hrs)</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in puestos %}
                    <tr>
                        <td><span class="badge {% if p.sucursal == 'Victoria' %}bg-primary{% else %}bg-success{% endif %}">{{ p.sucursal }}</span></td>
                        <td>{{ p.nombre }}</td>
                        <td><strong>${{ p.sueldo_base }}</strong></td>
                        <td>
                            <button class="btn btn-sm btn-warning" onclick="abrirModalEditar('{{ p.id }}', '{{ p.nombre }}', '{{ p.sueldo_base }}')">
                                <i class="fas fa-edit"></i> Editar
                            </button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="modalEditarPuesto" tabindex="-1">
    <div class="modal-dialog">
        <form method="POST" class="modal-content">
            {% csrf_token %}
            <div class="modal-header">
                <h5 class="modal-title">Editar Sueldo</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" name="puesto_id" id="edit_puesto_id">
                <p>Puesto: <strong id="edit_nombre_puesto"></strong></p>
                <div class="mb-3">
                    <label class="form-label">Nuevo Sueldo Base</label>
                    <input type="number" step="0.01" name="sueldo" id="edit_sueldo" class="form-control" required>
                </div>
            </div>
            <div class="modal-footer">
                <button type="submit" class="btn btn-primary">Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>

<script>
function abrirModalEditar(id, nombre, sueldo) {
    document.getElementById('edit_puesto_id').value = id;
    document.getElementById('edit_nombre_puesto').innerText = nombre;
    document.getElementById('edit_sueldo').value = sueldo;
    new bootstrap.Modal(document.getElementById('modalEditarPuesto')).show();
}
</script>
{% endblock %}
