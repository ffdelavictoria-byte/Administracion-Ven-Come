{% load static %}

<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cálculo de Nómina - Momias de la Victoria</title>

    

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">



<style>
        :root {
            --comic-border: 2px solid #000;
            --comic-shadow: 4px 4px 0px #000;
        }

        body {
            background-color: #f0f0f0;
            font-family: 'Open Sans', sans-serif;
            padding: 20px;
        }

        h2 {
            font-family: 'Bangers', cursive;
            letter-spacing: 2px;
            color: #2c3e50;
            text-shadow: 2px 2px 0px #fff;
        }

        .comic-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border: var(--comic-border);
            box-shadow: 10px 10px 0px rgba(0,0,0,0.1);
        }

        .card-comic {
            border: var(--comic-border);
            box-shadow: var(--comic-shadow);
            background-color: #fff9c4 !important;
            margin-bottom: 25px;
        }

        .form-control, .form-select {
            border: var(--comic-border);
            border-radius: 0;
        }

        .btn-comic {
            font-family: 'Bangers', cursive;
            font-size: 1.2rem;
            letter-spacing: 1px;
            border: var(--comic-border) !important;
            border-radius: 0;
            transition: 0.1s;
            text-transform: uppercase;
        }

        .btn-edit { background-color: #4CAF50; color: white; }
        
        .btn-comic:hover {
            transform: translate(-2px, -2px);
            box-shadow: var(--comic-shadow);
            color: white;
        }

        /* Estilo para las tiras recortables */
        .tira-recortable {
            border: 2px solid #000;
            padding: 15px;
            margin-bottom: 50px;
            background-color: white;
            position: relative;
            page-break-inside: avoid;
        }

        /* Línea de corte con tijeras */
        .tira-recortable::after {
            content: "- - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -";
            position: absolute;
            bottom: -30px;
            left: 0;
            width: 100%;
            font-family: monospace;
            text-align: center;
            color: #777;
            font-size: 1rem;
        }

        .tira-recortable h5 {
            font-family: 'Open Sans', sans-serif;
            font-weight: bold;
            border-bottom: 1px solid #000;
            padding-bottom: 5px;
        }

        .text-magenta { color: #9D174D; font-weight: bold; }

        @media print {
            .no-print { display: none !important; }
            .comic-container { border: none; box-shadow: none; width: 100%; max-width: 100%; padding: 0; }
            body { background: white; padding: 0; }
            .tira-recortable { border: 1px solid #000; margin-bottom: 60px; }
            .tira-recortable::after { color: #000; }
            @page { size: landscape; margin: 0.5cm; }
        }
    </style>

</head>

<body>
<div class="comic-container">

<header class="d-flex justify-content-between align-items-center mb-4 no-print">
    <h2 class="m-0"> Sistema de Nómina - Control Global</h2>
    <a href="{% url 'main' %}" class="btn btn-outline-dark btn-sm fw-bold">
        <i class="fas fa-arrow-left"></i> REGRESAR
    </a>
</header>

<div class="card card-comic no-print mb-4">
<div class="card-body">

<form method="GET" class="row g-3 align-items-end">

<div class="col-md-2">
<label class="form-label fw-bold small text-uppercase">Fecha Inicio:</label>
<input type="date" name="inicio" class="form-control" value="{{ inicio }}" required>
</div>

<div class="col-md-2">
<label class="form-label fw-bold small text-uppercase">Fecha Fin:</label>
<input type="date" name="fin" class="form-control" value="{{ fin }}" required>
</div>

<div class="col-md-2">
<label class="form-label fw-bold small text-uppercase">Empleado:</label>
<input type="text" name="nombre" class="form-control"
placeholder="Nombre..."
value="{{ nombre_busqueda|default_if_none:'' }}">
</div>

<div class="col-md-3">
<label class="form-label fw-bold small text-uppercase">Filtrar Sucursales:</label>

<div class="border p-2 bg-white"
style="height: 100px; overflow-y: scroll; border: 1px solid #ced4da; border-radius: 4px;">

<div class="form-check">
<input class="form-check-input" type="checkbox" id="check_todas" onclick="toggleAll(this)">
<label class="form-check-label fw-bold text-primary" for="check_todas">TODAS</label>
</div>

<hr class="my-1">

{% for s in todas_sucursales %}
<div class="form-check">
<input class="form-check-input"
type="checkbox"
name="sucursal"
value="{{ s }}"
{% if s in sucursales_seleccionadas %}checked{% endif %}>
<label class="form-check-label small">{{ s }}</label>
</div>
{% endfor %}

</div>
</div>

<div class="col-md-3 d-flex gap-2">
<button type="submit" class="btn btn-comic btn-edit flex-grow-1">
<i class="fas fa-calculator"></i> CALCULAR
</button>

<button type="button"
onclick="window.print();"
class="btn-comic"
style="background:#546e7a;color:white;padding:0 15px;">
<i class="fas fa-print"></i>
</button>

<button type="button"
onclick="descargaDirecta('excel')"
class="btn-comic"
style="background:#2e7d32;color:white;padding:0 15px;">
<i class="fas fa-file-excel"></i>
</button>

<button type="button"
onclick="descargaDirecta('pdf')"
class="btn-comic"
style="background:#c62828;color:white;padding:0 15px;">
<i class="fas fa-file-pdf"></i>
</button>

</div>

</form>
</div>
</div>
<script>
    function toggleAll(source) {
        let checkboxes = document.getElementsByName('sucursal');
        for(let cb of checkboxes) { cb.checked = source.checked; }
    }

    function descargaDirecta(tipo) {
        const inicio = document.querySelector('[name="inicio"]').value;
        const fin = document.querySelector('[name="fin"]').value;
        const nombre = document.querySelector('[name="nombre"]').value.trim();
        
        if (!inicio || !fin) {
            alert("¡Rayos! Por favor selecciona las fechas de inicio y fin.");
            return;
        }

        // Obtener sucursales seleccionadas
        const sucursales = Array.from(document.querySelectorAll('input[name="sucursal"]:checked'))
                                .map(cb => cb.value);

        let baseUrl = (tipo === 'excel') ? "{% url 'exportar_excel' %}" : "{% url 'exportar_pdf' %}";
        let url = new URL(window.location.origin + baseUrl);
        url.searchParams.append('inicio', inicio);
        url.searchParams.append('fin', fin);
        url.searchParams.append('nombre', nombre);
        sucursales.forEach(s => url.searchParams.append('sucursal', s));

        window.location.href = url.toString();
    }
</script>
</body>

</html>
